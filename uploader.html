<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Novela — Upload Chapters</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0e0c0a; --surface: #161412; --surface2: #1e1b18;
      --border: #2e2a25; --accent: #c9a96e; --accent2: #e8c99a;
      --text: #ede8e0; --muted: #7a7060; --danger: #e07070;
      --success: #7ec99a; --warning: #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 40% at 50% -5%, rgba(201,169,110,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(14,12,10,0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.85rem 2rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .topbar a {
      color: var(--muted); text-decoration: none; font-size: 0.82rem;
      transition: color 0.2s;
    }
    .topbar a:hover { color: var(--accent); }
    .topbar-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; color: var(--accent2); margin-left: auto;
    }

    .main { max-width: 720px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; color: var(--accent2);
      margin-bottom: 0.35rem;
    }
    .page-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 2rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .card-title {
      font-size: 0.72rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 1rem;
    }

    .field { margin-bottom: 0.9rem; }
    .field label {
      display: block; font-size: 0.72rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.35rem;
    }
    .field input {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 7px;
      padding: 0.65rem 0.9rem; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); opacity: 0.5; }

    /* Drop zone */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 10px; padding: 2.5rem;
      text-align: center; cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    .dropzone:hover, .dropzone.drag-over {
      border-color: var(--accent);
      background: rgba(201,169,110,0.04);
    }
    .dropzone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .dropzone-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .dropzone-text { font-size: 0.88rem; color: var(--muted); }
    .dropzone-text strong { color: var(--accent2); }

    /* File list */
    #file-list { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .file-item {
      display: flex; align-items: center; gap: 0.75rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.65rem 0.9rem;
      font-size: 0.82rem;
    }
    .file-item .fi-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem; color: var(--accent);
      min-width: 28px;
    }
    .file-item .fi-title { flex: 1; color: var(--text); }
    .file-item .fi-sub { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; }
    .file-item .fi-status { font-size: 0.7rem; margin-left: auto; }
    .fi-status.pending  { color: var(--muted); }
    .fi-status.uploading { color: var(--warning); }
    .fi-status.done     { color: var(--success); }
    .fi-status.error    { color: var(--danger); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 0.5rem; padding: 0.75rem 1.5rem;
      border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 500;
      cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #0e0c0a; }
    .btn-primary:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); }
    .btn-ghost {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: 0.82rem;
    }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

    .progress-bar {
      height: 4px; background: var(--border); border-radius: 2px;
      margin-top: 1rem; overflow: hidden; display: none;
    }
    .progress-bar.active { display: block; }
    .progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 2px; transition: width 0.3s;
    }

    .summary {
      font-size: 0.8rem; color: var(--muted);
      margin-top: 0.75rem; font-family: 'DM Mono', monospace;
    }
    .summary span { color: var(--accent2); }

    .actions { display: flex; gap: 0.75rem; align-items: center; margin-top: 1.25rem; }
  </style>
</head>
<body>
<div class="topbar">
  <a href="index.html">← Home</a>
  <div class="topbar-title">Upload Chapters</div>
</div>

<div class="main">
  <div class="page-title">Upload Chapters</div>
  <div class="page-sub">Select .txt files — chapter number, title, and content are parsed automatically.</div>

  <div class="card">
    <div class="card-title">Novel Details</div>
    <div class="field">
      <label>Novel Title (Collection Name)</label>
      <input id="novel-title" placeholder="e.g. The Wandering Immortal" />
    </div>
  </div>

  <div class="card">
    <div class="card-title">Chapter Files</div>
    <div class="dropzone" id="dropzone">
      <input type="file" id="file-input" multiple accept=".txt"/>
      <div class="dropzone-icon">📄</div>
      <div class="dropzone-text"><strong>Click to browse</strong> or drag & drop .txt files</div>
    </div>
    <div id="file-list"></div>
    <div class="summary" id="summary" style="display:none">
      <span id="summary-count">0</span> files ready · <span id="summary-chars">0</span> total characters
    </div>
  </div>

  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="upload-btn" onclick="startUpload()" disabled>Upload to Firestore</button>
    <button class="btn btn-ghost" onclick="clearFiles()">Clear</button>
    <div id="upload-status" style="font-size:0.8rem; color:var(--muted); margin-left:auto;"></div>
  </div>
</div>

<script type="module">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // Init Firebase from session
  const cfg = JSON.parse(sessionStorage.getItem('novela_config') || 'null');
  if (!cfg) { window.location.href = 'index.html'; }
  const app = getApps().length ? getApps()[0] : initializeApp(cfg);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, user => {
    if (!user) window.location.href = 'index.html';
  });

  let parsedFiles = [];

  // ---------- Parsing ----------
  function parseChapterFile(filename, content) {
    const lines = content.split('\n').map(l => l.trim()).filter(Boolean);
    let chapterNum = null;
    let title = null;
    let contentStart = 0;

    // Patterns to match: "Chapter 1", "Chapter 1:", "Chapter 1: Title", "Chapter One", "CH 1", "1.", "Prologue", "Epilogue"
    const patterns = [
      /^chapter\s+(\d+)\s*[:\-–—]?\s*(.*)/i,
      /^ch\.?\s*(\d+)\s*[:\-–—]?\s*(.*)/i,
      /^(\d+)\s*[:\.\-–—]\s*(.*)/,
      /^prologue/i,
      /^epilogue/i,
      /^interlude/i,
    ];

    for (let i = 0; i < Math.min(lines.length, 5); i++) {
      const line = lines[i];
      let matched = false;

      for (const pat of patterns) {
        const m = line.match(pat);
        if (m) {
          if (m[1] && /^\d+$/.test(m[1])) {
            chapterNum = parseInt(m[1]);
            title = m[2] ? m[2].trim() : null;
          } else {
            // Prologue/Epilogue/Interlude — no number
            chapterNum = null;
            title = line;
          }
          contentStart = i + 1;
          matched = true;
          break;
        }
      }
      if (matched) break;
    }

    // If no pattern matched, try to extract number from filename
    if (chapterNum === null) {
      const fnMatch = filename.match(/(\d+)/);
      if (fnMatch) chapterNum = parseInt(fnMatch[1]);
    }

    // Skip heading lines (underlines like ====)
    while (contentStart < lines.length && /^[=\-*]{3,}$/.test(lines[contentStart])) {
      contentStart++;
    }

    const chapterContent = lines.slice(contentStart).join('\n\n').trim();

    return {
      chapter: chapterNum,
      title: title || null,
      chapter_content: chapterContent,
      filename,
    };
  }

  // ---------- File input ----------
  const fileInput = document.getElementById('file-input');
  const dropzone  = document.getElementById('dropzone');

  fileInput.addEventListener('change', handleFiles);
  dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', ()  => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('drag-over');
    handleFileList(e.dataTransfer.files);
  });

  function handleFiles(e) { handleFileList(e.target.files); }

  function handleFileList(files) {
    const readers = [...files].filter(f => f.name.endsWith('.txt')).map(f => {
      return new Promise(resolve => {
        const r = new FileReader();
        r.onload = e => resolve({ name: f.name, content: e.target.result });
        r.readAsText(f, 'utf-8');
      });
    });

    Promise.all(readers).then(results => {
      parsedFiles = results.map(({ name, content }) => parseChapterFile(name, content));
      parsedFiles.sort((a, b) => (a.chapter ?? 9999) - (b.chapter ?? 9999));
      renderFileList();
      updateSummary();
      document.getElementById('upload-btn').disabled = parsedFiles.length === 0;
    });
  }

  function renderFileList() {
    const list = document.getElementById('file-list');
    list.innerHTML = parsedFiles.map((f, i) => `
      <div class="file-item" id="fi-${i}">
        <div class="fi-num">Ch.${f.chapter ?? '?'}</div>
        <div>
          <div class="fi-title">${f.title || f.filename}</div>
          <div class="fi-sub">${f.filename} · ${f.chapter_content.length.toLocaleString()} chars</div>
        </div>
        <div class="fi-status pending" id="fi-status-${i}">Pending</div>
      </div>`).join('');
  }

  function updateSummary() {
    const s = document.getElementById('summary');
    if (parsedFiles.length === 0) { s.style.display = 'none'; return; }
    s.style.display = 'block';
    document.getElementById('summary-count').textContent = parsedFiles.length;
    const total = parsedFiles.reduce((a, f) => a + f.chapter_content.length, 0);
    document.getElementById('summary-chars').textContent = total.toLocaleString();
  }

  window.clearFiles = function() {
    parsedFiles = [];
    fileInput.value = '';
    document.getElementById('file-list').innerHTML = '';
    document.getElementById('summary').style.display = 'none';
    document.getElementById('upload-btn').disabled = true;
    document.getElementById('upload-status').textContent = '';
    document.getElementById('progress-bar').classList.remove('active');
  };

  // ---------- Upload ----------
  window.startUpload = async function() {
    const novelTitle = document.getElementById('novel-title').value.trim();
    if (!novelTitle) {
      alert('Please enter a novel title first.'); return;
    }
    if (parsedFiles.length === 0) return;

    const btn = document.getElementById('upload-btn');
    btn.disabled = true;
    const bar = document.getElementById('progress-bar');
    const fill = document.getElementById('progress-fill');
    bar.classList.add('active');

    let done = 0, errors = 0;

    for (let i = 0; i < parsedFiles.length; i++) {
      const f = parsedFiles[i];
      const statusEl = document.getElementById(`fi-status-${i}`);
      statusEl.textContent = 'Uploading…';
      statusEl.className = 'fi-status uploading';

      try {
        const docId = f.chapter != null
          ? String(f.chapter).padStart(4, '0')
          : `extra_${i}`;

        await setDoc(doc(collection(db, novelTitle), docId), {
          chapter: f.chapter ?? null,
          title: f.title ?? null,
          chapter_content: f.chapter_content,
          uploaded_at: new Date().toISOString(),
        });

        // Register novel in index so reader/manager can discover it
        await setDoc(doc(db, 'novela_index', novelTitle), {
          name: novelTitle,
          updated_at: new Date().toISOString(),
        }, { merge: true });

        statusEl.textContent = '✓ Done';
        statusEl.className = 'fi-status done';
        done++;
      } catch(e) {
        statusEl.textContent = '✗ Error';
        statusEl.className = 'fi-status error';
        statusEl.title = e.message;
        console.error('Upload error:', e);
        document.getElementById('upload-status').textContent = 'Error: ' + e.message;
        errors++;
      }

      fill.style.width = `${Math.round(((i + 1) / parsedFiles.length) * 100)}%`;
      document.getElementById('upload-status').textContent =
        `${i + 1} / ${parsedFiles.length} processed`;
    }

    document.getElementById('upload-status').textContent =
      `✓ ${done} uploaded${errors ? ` · ${errors} failed` : ''}`;
    btn.disabled = false;
  };
</script>
</body>
</html>
